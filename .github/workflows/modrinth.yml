name: Publish to Modrinth

on:
  push:
    branches: [ "main" ]

jobs:
  modrinth:
    if: ${{ !contains(github.event.head_commit.message, '[modrinth-skip]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Downloading code
        uses: actions/checkout@v4

      - name: Setting up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Building the project
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Resolve metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER=$(./gradlew -q properties | awk '/^version:/{print $2}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Publishing to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ByOXlhnZ
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/!(*-sources|*-dev|*-javadoc).jar
          name: ${{ steps.meta.outputs.sha }}
          version: Corex ${{ steps.meta.outputs.ver }}-${{ steps.meta.outputs.sha }}
          version-type: release
          changelog: ${{ github.event.head_commit.message }}
          loaders: |
            paper
            folia
            purpur
            velocity
          game-versions: |
            1.21.x
